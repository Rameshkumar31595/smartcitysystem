{% load static %}

  <div class="sidebar-section">
    <span class="sidebar-section-label">Management</span>
    <a href="{% url 'admin_user_list' %}"
       class="sidebar-link {% if request.resolver_match.url_name == 'admin_user_list' %}active{% endif %}">
      <span>Manage Users</span>
    </a>
    <a href="{% url 'admin_activity_logs' %}"
       class="sidebar-link {% if request.resolver_match.url_name == 'admin_activity_logs' %}active{% endif %}">

  </div>

  <div class="sidebar-section">
    <span class="sidebar-section-label">Categories</span>
    <a href="{% url 'service_category_list' %}"
       class="sidebar-link {% if request.resolver_match.url_name == 'service_category_list' %}active{% endif %}">
      <span>Service Categories</span>
    </a>
    <a href="{% url 'issue_category_list' %}"
       class="sidebar-link {% if request.resolver_match.url_name == 'issue_category_list' %}active{% endif %}">
